<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>Text Case Converter - Free Online Tool</title>
  <meta name="description" content="Convert text to uppercase, lowercase, capitalized, and sentence case instantly with this free online tool.">

  <link rel="icon" href="../favicon.png" type="image/png">

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body>

<header>
  <h1>Text Case Converter</h1>
  <p>Convert your text instantly</p>

  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
</header>

<main class="tool-container">

  <a href="../index.html">← Back to Home</a>

  <p>
    This free text case converter lets you quickly transform your text into
    uppercase, lowercase, capitalized, or sentence case.
  </p>

  <textarea 
    id="textInput" 
    rows="10" 
    placeholder="Type or paste your text here..."
    aria-label="Text input"
  ></textarea>

  <div>
    <button onclick="toUpper()">UPPERCASE</button>
    <button onclick="toLower()">lowercase</button>
    <button onclick="toCapitalized()">Capitalize</button>
    <button onclick="toSentenceCase()">Sentence Case</button>
    <button onclick="clearText()">Clear</button>
  </div>

  <div class="output">
    <p>Result:</p>
    <textarea id="outputText" rows="6" readonly></textarea>
  </div>

  <button onclick="copyResult()">Copy Result</button>

</main>

<footer>
  <p>© 2026 Free Tools Website</p>
</footer>

<!-- Scripts -->
<script src="../script.js"></script>
<script src="../js/text-case.js"></script>

</body>
</html>
