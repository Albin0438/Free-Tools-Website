<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>Word Counter Tool - Free Online</title>
  <meta name="description" content="Free online word counter tool to count words and characters instantly. Fast and easy to use.">

  <link rel="icon" href="../favicon.png" type="image/png">

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body>

<header>
  <h1>Word Counter</h1>
  <p>Count words and characters instantly</p>

  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
</header>

<main class="tool-container">

  <a href="../index.html">← Back to Home</a>

  <p>
    This free word counter tool helps you quickly count words and characters.
    Useful for writing, blogging, and assignments.
  </p>

  <textarea 
    id="textInput" 
    rows="10" 
    placeholder="Type or paste your text here..."
    aria-label="Text input"
  ></textarea>

  <div class="output">
    <p>Words: <span id="wordCount">0</span></p>
    <p>Characters: <span id="charCount">0</span></p>
  </div>

  <button onclick="copyText()">Copy Text</button>

</main>

<footer>
  <p>© 2026 Free Tools Website</p>
</footer>

<!-- Scripts -->
<script src="../script.js"></script>
<script src="../js/word-counter.js"></script>

</body>
</html>
